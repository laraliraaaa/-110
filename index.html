<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打給耶穌的電話</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fffaf5; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // 聖經數據資料庫：點擊後會直接跳轉到 BibleGateway 的對應頁面
        const scriptureData = [
            { id: 1, title: "當你憂傷時", verse: "約翰福音 14", category: "情感慰藉", icon: "❤️", url: "https://www.biblegateway.com/passage/?search=John+14&version=CUV" },
            { id: 2, title: "當你犯了罪", verse: "詩篇 51", category: "認罪悔改", icon: "🛡️", url: "https://www.biblegateway.com/passage/?search=Psalm+51&version=CUV" },
            { id: 3, title: "當你面對危難", verse: "詩篇 91", category: "安全保障", icon: "⚡", url: "https://www.biblegateway.com/passage/?search=Psalm+91&version=CUV" },
            { id: 4, title: "當所有人令你失望", verse: "詩篇 27", category: "情感慰藉", icon: "👥", url: "https://www.biblegateway.com/passage/?search=Psalm+27&version=CUV" },
            { id: 5, title: "當你覺得上帝離你很遠", verse: "詩篇 139", category: "信心建立", icon: "📍", url: "https://www.biblegateway.com/passage/?search=Psalm+139&version=CUV" },
            { id: 6, title: "當你的信心需要鼓勵", verse: "希伯來書 11", category: "信心建立", icon: "☀️", url: "https://www.biblegateway.com/passage/?search=Hebrews+11&version=CUV" },
            { id: 7, title: "當你又孤單又懼怕時", verse: "詩篇 23", category: "情感慰藉", icon: "🛡️", url: "https://www.biblegateway.com/passage/?search=Psalm+23&version=CUV" },
            { id: 8, title: "當你擔憂時", verse: "馬太福音 8:19-34", category: "情感慰藉", icon: "⚡", url: "https://www.biblegateway.com/passage/?search=Matthew+8:19-34&version=CUV" },
            { id: 9, title: "當你受傷害，心懷不平時", verse: "哥林多前書 13", category: "人際關係", icon: "❤️", url: "https://www.biblegateway.com/passage/?search=1+Corinthians+13&version=CUV" },
            { id: 10, title: "當你懷疑基督信仰時", verse: "哥林多後書 5:15-18", category: "信心建立", icon: "📖", url: "https://www.biblegateway.com/passage/?search=2+Corinthians+5:15-18&version=CUV" },
            { id: 11, title: "當你覺得被遺棄時", verse: "羅馬書 8:31-39", category: "情感慰藉", icon: "📍", url: "https://www.biblegateway.com/passage/?search=Romans+8:31-39&version=CUV" },
            { id: 12, title: "當你尋找平安時", verse: "馬太福音 11:25-30", category: "情感慰藉", icon: "☀️", url: "https://www.biblegateway.com/passage/?search=Matthew+11:25-30&version=CUV" },
            { id: 13, title: "當你覺得世界比上帝更大時", verse: "詩篇 90", category: "信心建立", icon: "⚡", url: "https://www.biblegateway.com/passage/?search=Psalm+90&version=CUV" },
            { id: 14, title: "當你需要基督保障時", verse: "羅馬書 8:1-30", category: "信心建立", icon: "🛡️", url: "https://www.biblegateway.com/passage/?search=Romans+8:1-30&version=CUV" },
            { id: 15, title: "當你出門遠行時", verse: "詩篇 121", category: "生活引導", icon: "📍", url: "https://www.biblegateway.com/passage/?search=Psalm+121&version=CUV" },
            { id: 16, title: "當你為自己禱告時", verse: "詩篇 87", category: "生活引導", icon: "📖", url: "https://www.biblegateway.com/passage/?search=Psalm+87&version=CUV" },
            { id: 17, title: "當你需要勇氣完成工作時", verse: "約書亞記 1", category: "工作挑戰", icon: "💼", url: "https://www.biblegateway.com/passage/?search=Joshua+1&version=CUV" },
            { id: 18, title: "當你思慮投資與生活時", verse: "馬可福音 10:17-31", category: "生活引導", icon: "💼", url: "https://www.biblegateway.com/passage/?search=Mark+10:17-31&version=CUV" },
        ];

        const categories = ["全部", ...new Set(scriptureData.map(item => item.category))];

        const App = () => {
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedCategory, setSelectedCategory] = useState("全部");

            const handleItemClick = (item) => {
                // 直接開啟新分頁並導向聖經網址
                window.open(item.url, '_blank');
            };

            const filteredData = scriptureData.filter(item => {
                const matchesSearch = item.title.includes(searchTerm) || item.verse.includes(searchTerm);
                const matchesCategory = selectedCategory === "全部" || item.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            return (
                <div className="max-w-4xl mx-auto px-4 py-12">
                    <header className="text-center mb-12">
                        <div className="flex justify-center items-center gap-3 mb-4">
                            <span className="text-5xl">📞</span>
                            <h1 className="text-4xl font-extrabold text-stone-900 tracking-tight">打給耶穌的電話</h1>
                        </div>
                        <p className="text-stone-500 italic font-medium">點擊下方卡片，直接翻開聖經尋求指引</p>
                    </header>

                    <div className="mb-10 flex flex-col md:flex-row gap-4">
                        <input 
                            className="flex-1 p-4 rounded-2xl bg-white border border-stone-200 shadow-sm outline-none focus:ring-2 focus:ring-orange-300 transition-all text-lg"
                            placeholder="搜尋心情或經文 (例如：憂慮...)"
                            value={searchTerm}
                            onChange={e => setSearchTerm(e.target.value)}
                        />
                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                            {categories.map(cat => (
                                <button 
                                    key={cat}
                                    onClick={() => setSelectedCategory(cat)}
                                    className={`px-5 py-2 rounded-full whitespace-nowrap font-bold transition-all ${
                                        selectedCategory === cat ? 'bg-orange-500 text-white shadow-md' : 'bg-white text-stone-500 border border-stone-200 hover:bg-orange-50'
                                    }`}
                                >{cat}</button>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredData.map(item => (
                            <div 
                                key={item.id} 
                                onClick={() => handleItemClick(item)} 
                                className="bg-white p-7 rounded-3xl shadow-sm hover:shadow-xl cursor-pointer border border-stone-50 transition-all transform hover:-translate-y-1"
                            >
                                <div className="text-3xl mb-4 p-3 bg-orange-50 inline-block rounded-2xl">{item.icon}</div>
                                <h3 className="font-bold text-xl text-stone-800 mb-1">{item.title}</h3>
                                <p className="text-stone-400 font-medium mb-6">{item.verse}</p>
                                <div className="text-orange-500 font-bold flex items-center gap-1">
                                    閱讀經文 ➜
                                </div>
                            </div>
                        ))}
                    </div>

                    <footer className="mt-20 text-center text-stone-300 text-sm">
                        <p>願每一句經文帶給你力量</p>
                        <p className="mt-2"> Scripture source: BibleGateway</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
