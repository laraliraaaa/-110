                lovesYou: "練習做一件慷慨的小事。當你給予，就是在宣告：我的財富源頭是上帝。"
            },
            { 
                id: 26, title: "當你心情低落時", verse: "詩篇 27:14", category: "情感慰藉", icon: "☁️", 
                story: "大衛的勸告是「等候」。等候是在沈默中聚集力量，預備乘風而上。",
                needs: "低落時不要做重大決定。你需要靜止。相信黑夜必過，恩典正在看不見處動工。",
                pray: "天父，我的靈魂垂頭喪氣。求堅固我的心，讓我學會在你裡面等候。我相信曙光。阿門。",
                lovesYou: "今天早點睡覺。好好照顧身體，也是一種信靠上帝照顧靈魂的方式。"
            },
            { 
                id: 27, title: "當你經濟感到壓力時", verse: "詩篇 37:25", category: "生活引導", icon: "🍞", 
                story: "大衛見證：尋求上帝的人，即便經歷乾旱年，也從未被徹底撇棄。",
                needs: "壓力會讓我們覺得被神忘了。回顧過去，神如何帶領你度過每一次難關。",
                pray: "供應的主，求按信實供應我的基本需要。賜我智慧善用每分錢，走過低谷。阿門。",
                lovesYou: "數算今天擁有的。神以前為你開路，今天也會。祂負責你到底。"
            },
            { 
                id: 28, title: "當你覺得世界很小時", verse: "詩篇 19:1-2", category: "信心建立", icon: "🌌", 
                story: "大衛仰望星空，看見宇宙秩序大聲傳揚造物主的設計。這是一場無聲的交響樂。",
                needs: "枯燥時是因為靈魂需要擴張。去感受大自然，意識到創造星系的神也愛著你。",
                pray: "偉大的造物主，諸天述說你的榮耀。讓我看見你的奇妙，體會你細膩的愛。阿門。",
                lovesYou: "找一張宇宙照片。提醒自己：你是這位偉大造物主眼中的瞳人。"
            }
        ];

        const categories = ["全部", ...new Set(scriptureData.map(item => item.category))];

        const App = () => {
            const [view, setView] = useState('list');
            const [selectedItem, setSelectedItem] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedCategory, setSelectedCategory] = useState("全部");
            const [showPray, setShowPray] = useState(false);

            const handleItemClick = (item) => {
                setSelectedItem(item);
                setShowPray(false);
                setView('reading');
                window.scrollTo(0, 0);
            };

            const filteredData = scriptureData.filter(item => {
                const matchesSearch = item.title.includes(searchTerm) || item.verse.includes(searchTerm);
                const matchesCategory = selectedCategory === "全部" || item.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            if (view === 'reading') {
                return (
                    <div className="max-w-2xl mx-auto p-4 py-10 min-h-screen text-stone-800">
                        <button onClick={() => setView('list')} className="mb-6 flex items-center text-stone-400 hover:text-orange-500 transition-colors font-bold">
                           ⬅️ Back to Menu
                        </button>
                        <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-stone-50">
                            <div className="text-center mb-10">
                                <div className="text-5xl mb-4 p-4 bg-orange-50 inline-block rounded-3xl">{selectedItem.icon}</div>
                                <h2 className="text-3xl font-bold mb-2">{selectedItem.title}</h2>
                                <p className="text-orange-500 font-bold text-xl">{selectedItem.verse}</p>
                            </div>

                            <div className="space-y-8 leading-loose">
                                <div>
                                    <h3 className="text-orange-600 font-bold text-xl mb-3 flex items-center gap-2">
                                        <span className="w-1.5 h-6 bg-orange-500 rounded-full"></span>
                                        The Bible says...
                                    </h3>
                                    <p className="text-lg bg-stone-50 p-6 rounded-2xl italic border-l-4 border-stone-200">
                                        {selectedItem.story}
                                    </p>
                                </div>

                                <div>
                                    <h3 className="text-orange-600 font-bold text-xl mb-3 flex items-center gap-2">
                                        <span className="w-1.5 h-6 bg-orange-500 rounded-full"></span>
                                        And you needs...
                                    </h3>
                                    <p className="text-lg">{selectedItem.needs}</p>
                                </div>

                                {!showPray ? (
                                    <div className="py-6 text-center">
                                        <button 
                                            onClick={() => setShowPray(true)}
                                            className="px-10 py-4 bg-stone-900 text-white rounded-full font-bold shadow-xl hover:bg-orange-600 transition-all transform hover:scale-105 active:scale-95 flex items-center gap-3 mx-auto"
                                        >
                                            <span className="text-xl">🙏</span> Let's Pray
                                        </button>
                                    </div>
                                ) : (
                                    <div className="animate-in slide-in-from-bottom-4 duration-500">
                                        <h3 className="text-orange-600 font-bold text-xl mb-3 flex items-center gap-2">
                                            <span className="w-1.5 h-6 bg-orange-500 rounded-full"></span>
                                            Pray
                                        </h3>
                                        <div className="bg-orange-50 p-8 rounded-[2rem] text-stone-800 text-lg leading-loose shadow-inner italic border border-orange-100">
                                            {selectedItem.pray}
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <h3 className="text-orange-600 font-bold text-xl mb-3 flex items-center gap-2">
                                        <span className="w-1.5 h-6 bg-orange-500 rounded-full"></span>
                                        God loves you.
                                    </h3>
                                    <p className="text-lg text-stone-600 bg-white border border-stone-100 p-6 rounded-2xl shadow-sm">
                                        {selectedItem.lovesYou}
                                    </p>
                                </div>
                            </div>

                            <div className="mt-16 text-center border-t border-stone-100 pt-10">
                                <button 
                                    onClick={() => setView('list')}
                                    className="bg-stone-100 text-stone-500 px-10 py-3 rounded-full font-medium hover:bg-stone-200 transition-all"
                                >
                                    Finish Reading
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto px-4 py-12">
                    <header className="text-center mb-16">
                        <div className="flex justify-center items-center gap-4 mb-4">
                            <span className="text-6xl drop-shadow-lg">📞</span>
                            <h1 className="text-5xl font-black text-stone-900 tracking-tighter">打給耶穌的電話</h1>
                        </div>
                        <p className="text-stone-400 font-medium tracking-widest uppercase text-sm">A direct line to comfort and grace</p>
                    </header>

                    <div className="mb-10 flex flex-col md:flex-row gap-4">
                        <input 
                            className="flex-1 p-5 rounded-3xl bg-white border-2 border-stone-50 shadow-sm outline-none focus:border-orange-200 transition-all text-lg"
                            placeholder="搜尋心情或關鍵字..."
                            value={searchTerm}
                            onChange={e => setSearchTerm(e.target.value)}
                        />
                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                            {categories.map(cat => (
                                <button 
                                    key={cat}
                                    onClick={() => setSelectedCategory(cat)}
                                    className={`px-6 py-2 rounded-2xl whitespace-nowrap font-bold transition-all ${
                                        selectedCategory === cat ? 'bg-orange-500 text-white shadow-lg scale-105' : 'bg-white text-stone-400 hover:bg-orange-50'
                                    }`}
                                >{cat}</button>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        {filteredData.map(item => (
                            <div 
                                key={item.id} 
                                onClick={() => handleItemClick(item)} 
                                className="group bg-white p-8 rounded-[2.5rem] shadow-sm hover:shadow-2xl cursor-pointer border border-stone-50 transition-all transform hover:-translate-y-2 active:scale-95"
                            >
                                <div className="text-4xl mb-6 p-4 bg-orange-50 inline-block rounded-2xl group-hover:bg-orange-500 group-hover:rotate-6 transition-all">{item.icon}</div>
                                <h3 className="font-bold text-2xl text-stone-800 mb-2">{item.title}</h3>
                                <p className="text-stone-300 font-medium mb-8">{item.verse}</p>
                                <div className="text-orange-500 font-black flex items-center gap-2 group-hover:gap-4 transition-all uppercase text-sm tracking-widest">
                                    Call Now ➜
                                </div>
                            </div>
                        ))}
                    </div>

                    <footer className="mt-32 text-center text-stone-300">
                        <div className="w-16 h-1 bg-orange-100 mx-auto mb-8 rounded-full"></div>
                        <p className="italic">"呼求我，我就應允你。"</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
